<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Criminal - Cockpit de Auditoria</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --neon-blue: #00f2fe;
            --matte-warm: #2c1a1a;
            --warm-glow: #ff4500;
            --bg-dark: #050505;
            --text-base: #e0e0e0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-base);
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
            overflow: hidden;
        }

        /* --- TELA DE LOGIN (MODULO 3) --- */
        #overlay-login {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('modulo3.png') no-repeat center center;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            transition: opacity 0.8s ease;
        }

        .login-card {
            background: rgba(44, 26, 26, 0.9);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid var(--neon-blue);
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.4);
            width: 320px;
        }

        .input-token {
            width: 80%;
            padding: 12px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            outline: none;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            background: rgba(10, 10, 10, 0.95);
            border-right: 1px solid rgba(0, 242, 254, 0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .guia-visual {
            width: 100%;
            height: 110px;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .guia-visual.active { border-color: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }

        /* --- PAINEL PRINCIPAL --- */
        .main-content { padding: 30px; display: grid; grid-template-rows: auto 1fr auto; gap: 20px; }

        #painel-relatorio {
            background-color: var(--matte-warm);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid rgba(255, 69, 0, 0.3);
            overflow-y: auto;
            position: relative;
            min-height: 400px;
        }

        #progresso-container {
            flex-grow: 1; height: 12px; background: #111; border-radius: 6px; overflow: hidden;
        }

        .progress-fill { height: 100%; width: 0%; transition: 0.5s; background: var(--neon-blue); }
        .progress-fill.active { box-shadow: 0 0 20px var(--neon-blue); }

        button {
            background: transparent; border: 1px solid var(--neon-blue);
            color: var(--neon-blue); font-family: 'Orbitron', sans-serif;
            padding: 12px 24px; cursor: pointer; transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }

        .verbatim { font-family: 'Courier New', monospace; color: #ffca28; background: rgba(0,0,0,0.3); padding: 10px; border-left: 3px solid var(--warm-glow); }
    </style>
</head>
<body>

    <div id="overlay-login">
        <div class="login-card">
            <h1 style="font-family:'Orbitron'; color:var(--neon-blue); margin-top:0;">NEURAL CRIMINAL</h1>
            <p style="font-size: 10px; letter-spacing: 2px;">AUTENTICAÇÃO REQUERIDA</p>
            <input type="password" id="token-acesso" class="input-token" placeholder="****">
            <br>
            <button id="btn-desbloquear" onclick="validarAcesso()">Desbloquear</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="guia-visual active" style="background-image: url('modulo1.png');"></div>
        <div class="guia-visual" style="background-image: url('modulo2.png');"></div>
        <div class="guia-visual" style="background-image: url('modulo3.png');"></div>
        <button style="font-size: 10px;" onclick="alert('Sistema de Varredura Ativo.')">Varredura de Requisitos</button>
    </div>

    <div class="main-content">
        <div style="display:flex; gap:15px; align-items:center;">
            <input type="file" id="pdfInput" style="color:var(--neon-blue); font-size: 14px;">
            <button onclick="iniciarAuditoria()">Iniciar Auditoria</button>
            <div id="progresso-container">
                <div id="progresso" class="progress-fill"></div>
            </div>
        </div>

        <div id="painel-relatorio">
            <h2 style="font-family:'Orbitron'; color:var(--warm-glow);">AGUARDANDO COMANDO...</h2>
            <p>Selecione um arquivo PDF e clique em Iniciar Auditoria para processar o relatório neural.</p>
        </div>
    </div>

    <script>
        // FUNÇÃO DE DESBLOQUEIO (LOGIN)
        function validarAcesso() {
            const input = document.getElementById('token-acesso');
            if(input.value === "NC2026") {
                const overlay = document.getElementById('overlay-login');
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 800);
                console.log("Acesso concedido.");
            } else {
                alert("ACESSO NEGADO: Chave Mestra Inválida.");
                input.value = "";
            }
        }

        // PERMITIR TECLA ENTER NO LOGIN
        document.getElementById('token-acesso').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                validarAcesso();
            }
        });

        // FUNÇÃO DE AUDITORIA (CONEXÃO COM RAILWAY)
        async function iniciarAuditoria() {
            // 1. COLE O LINK QUE A HOSTINGER TE DEU ENTRE AS ASPAS ABAIXO:
            // Para teste local, usamos: http://localhost:3000/analisar
            const URL_DO_MOTOR = "http://localhost:3000/analisar";

            const fileInput = document.getElementById('pdfInput');
            const file = fileInput.files[0];
            
            if(!file) {
                alert("Por favor, selecione o arquivo PDF do Inquérito.");
                return;
            }

            const painel = document.getElementById('painel-relatorio');
            const progresso = document.getElementById('progresso');

            // Feedback visual imediato
            painel.innerHTML = "<h2>VARREDURA NEURAL INICIADA...</h2><p>Lendo estrutura do PDF e extraindo dados de Três Lagoas.</p>";
            progresso.classList.add('active');
            progresso.style.width = "40%";

            const formData = new FormData();
            formData.append('file', file);

            try {
                // Envio para o Node.js na Hostinger
                const response = await fetch(URL_DO_MOTOR, {
                    method: "POST",
                    mode: "cors",
                    body: formData
                    // Nota: Não adicione Headers manuais, o FormData faz isso sozinho
                });

                if(!response.ok) {
                    throw new Error(`Servidor respondeu com erro: ${response.status}`);
                }

                const dados = await response.json();
                
                // Sucesso! Mostra o relatório na tela
                progresso.style.width = "100%";
                
                setTimeout(() => {
                    progresso.classList.remove('active');
                    painel.innerHTML = `
                        <h2 style="font-family:'Orbitron'; color:#00f2ff;">AUDITORIA CONCLUÍDA</h2>
                        <p><strong>RÉU DETECTADO:</strong> ${dados.detalhes.reu}</p>
                        <p><strong>DATA DO SISTEMA:</strong> ${dados.detalhes.recebimento_denuncia}</p>
                        <hr style="border: 0.5px solid #00f2ff; opacity: 0.3; margin: 15px 0;">
                        <p style="font-size: 0.9em; line-height: 1.4;"><strong>RESUMO DOS FATOS:</strong><br>${dados.detalhes.fatos}</p>
                        <div style="background: rgba(0,242,255,0.1); padding: 15px; border-left: 4px solid #00f2ff; margin-top: 20px;">
                            <span style="color:#00f2ff; font-weight:bold;">CONCLUSÃO NEURAL:</span><br>
                            ${dados.detalhes.conclusao}
                        </div>
                    `;
                }, 800);

            } catch (erro) {
                console.error("Erro de conexão:", erro);
                progresso.style.width = "0%";
                painel.innerHTML = `
                    <h2 style="color:#ff4444;">ERRO DE COMUNICAÇÃO</h2>
                    <p>O motor não respondeu ao chamado.</p>
                    <p style="font-size:11px; color:#888;">Motivo: ${erro.message}</p>
                    <button onclick="location.reload()" style="margin-top:20px; background:transparent; border:1px solid #ff4444; color:#ff4444; padding:8px 20px; cursor:pointer;">RECONECTAR MOTOR</button>
                `;
            }
        }
    </script>
</body>
</html>
